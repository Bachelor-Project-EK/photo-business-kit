name: Integration Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Umbraco.Extension.Test/Umbraco.Extension.Test.csproj

      - name: Build
        run: dotnet build Umbraco.Extension.Test/Umbraco.Extension.Test.csproj --configuration Release --no-restore

      - name: Run integration tests
        run: dotnet test Umbraco.Extension.Test/Umbraco.Extension.Test.csproj --configuration Release --no-build --filter "TestCategory=IntegrationTest"
