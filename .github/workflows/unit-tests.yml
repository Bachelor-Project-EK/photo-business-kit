name: Unit Tests

on:
  push:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build Umbraco.Extension.Test/Umbraco.Extension.Test.csproj --configuration Release

      - name: Run unit tests
        run: dotnet test Umbraco.Extension.Test/Umbraco.Extension.Test.csproj --configuration Release --no-build --filter "TestCategory=UnitTest"
