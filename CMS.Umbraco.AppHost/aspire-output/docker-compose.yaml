services:
  compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    environment:
      DASHBOARD__OTLP__AUTHMODE: "ApiKey"
      DASHBOARD__OTLP__PRIMARYAPIKEY: "${DASHBOARD__OTLP__PRIMARYAPIKEY}"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  sql:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
    expose:
      - "1433"
    networks:
      - "aspire"
  cms-umbraco:
    image: "${CMS_UMBRACO_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${CMS_UMBRACO_PORT}"
      ConnectionStrings__umbracoDbDSN: "Server=sql,1433;User ID=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true;Initial Catalog=umbracoDbDSN"
      UMBRACODBDSN_HOST: "sql"
      UMBRACODBDSN_PORT: "1433"
      UMBRACODBDSN_USERNAME: "sa"
      UMBRACODBDSN_PASSWORD: "${SQL_PASSWORD}"
      UMBRACODBDSN_URI: "mssql://sa:${SQL_PASSWORD}@sql:1433/umbracoDbDSN"
      UMBRACODBDSN_JDBCCONNECTIONSTRING: "jdbc:sqlserver://sql:1433;databaseName=umbracoDbDSN;trustServerCertificate=true"
      UMBRACODBDSN_DATABASENAME: "umbracoDbDSN"
      ASPNETCORE_ENVIRONMENT: "Development"
      OTEL_EXPORTER_OTLP_HEADERS: "x-otlp-api-key=${DASHBOARD__OTLP__PRIMARYAPIKEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "cms-umbraco"
    expose:
      - "${CMS_UMBRACO_PORT}"
    depends_on:
      sql:
        condition: "service_started"
    user: "root"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
