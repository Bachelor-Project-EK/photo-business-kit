services:
  env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  umbraco-db:
    image: "${UMBRACO_DB_IMAGE}"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
      - "1434:1434"
    expose:
      - "1433"
    volumes:
      - type: "volume"
        target: "/var/opt/mssql"
        source: "umb_database"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "/healthcheck.sh"
      interval: "5m"
      timeout: "5s"
      retries: 3
      start_period: "30s"
  umbraco-cms:
    image: "${UMBRACO_CMS_IMAGE}"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080;https://+:8081"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/aspnetcore.pfx"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "DevOnlyPassword"
      ConnectionStrings__umbracoDbDSN: "Server=umbraco-db,1433;User ID=sa;Password=${DB_PASSWORD};TrustServerCertificate=true"
      ConnectionStrings__umbracoDbDSN_ProviderName: "Microsoft.Data.SqlClient"
    ports:
      - "44372:8081"
    volumes:
      - type: "volume"
        target: "/app/umbraco/Logs"
      - type: "volume"
        target: "/app/umbraco/Data"
    depends_on:
      umbraco-db:
        condition: "service_healthy"
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "https://+8081:/umbraco/api/health/ready"
      interval: "10s"
      timeout: "5s"
      retries: 3
      start_period: "30s"
networks:
  aspire:
    driver: "bridge"
volumes:
  umb_database:
    driver: "local"
  umb_logs:
    driver: "local"
  umb_data:
    driver: "local"
